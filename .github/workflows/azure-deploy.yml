name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  ACR_NAME: reasoningagentregistry
  CONTAINER_APP_NAME: reasoning-agent-app
  RESOURCE_GROUP: rg-reasoning-agent

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/reasoning-agent:${{ github.sha }} -t ${{ env.ACR_NAME }}.azurecr.io/reasoning-agent:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/reasoning-agent --all-tags

      - name: Get ACR Credentials
        id: get-acr-creds
        run: |
          ACR_USER=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)
          ACR_PASS=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASS"
          echo "username=$ACR_USER" >> $GITHUB_OUTPUT
          echo "password=$ACR_PASS" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: ${{ env.ACR_NAME }}.azurecr.io
          registryUsername: ${{ steps.get-acr-creds.outputs.username }}
          registryPassword: ${{ steps.get-acr-creds.outputs.password }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/reasoning-agent:${{ github.sha }}
          ingress: external
          targetPort: 8000
          environmentVariables: >-
            AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
            AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
            AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
            MCP_SERVER_URL=${{ secrets.MCP_SERVER_URL }}
            MCP_AUTH_TOKEN=${{ secrets.MCP_AUTH_TOKEN }}
            AZURE_EXISTING_AGENT_ID=${{ secrets.AZURE_EXISTING_AGENT_ID }}
            AZURE_EXISTING_AIPROJECT_ENDPOINT=${{ secrets.AZURE_EXISTING_AIPROJECT_ENDPOINT }}
